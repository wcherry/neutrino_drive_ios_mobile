name: NeutrinoDrive
packages:
  swift-sodium:
    url: https://github.com/jedisct1/swift-sodium
    from: "0.9.1"
options:
  bundleIdPrefix: com.neutrino
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16"

targets:
  NeutrinoDrive:
    type: application
    platform: iOS
    sources:
      - path: NeutrinoDrive
    dependencies:
      - package: swift-sodium
        product: Sodium
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.neutrino.drive
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        DEVELOPMENT_TEAM: "46KWJJ63FU"
    info:
      path: NeutrinoDrive/Info.plist
      properties:
        CFBundleName: Neutrino Drive
        CFBundleDisplayName: Neutrino Drive
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSCameraUsageDescription: "Neutrino Drive needs camera access to scan QR codes for key import."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        LSSupportsOpeningDocumentsInPlace: false
        CFBundleDocumentTypes:
          - CFBundleTypeName: Neutrino Drive Key File
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.json
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.neutrino.drive.keyfile
            UTTypeConformsTo:
              - public.json
            UTTypeDescription: Neutrino Drive Key File
            UTTypeTagSpecification:
              public.filename-extension:
                - json

  NeutrinoDriveTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: NeutrinoDriveTests
    dependencies:
      - target: NeutrinoDrive
    settings:
      base:
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: minimal
